name: Bug Report
description: Report a bug in OpenMagic
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Paste the debug info from the toolbar's copy button if available.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: debug-info
    attributes:
      label: Debug Info
      description: Click the bug icon in the toolbar, or use the copy button on a chat message, then paste here.
      render: text
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
  - type: input
    id: framework
    attributes:
      label: Framework
      description: What framework is your project using?
      placeholder: Next.js 16, Vite + React, Vue 3, plain HTML, etc.
  - type: input
    id: os
    attributes:
      label: OS / Browser
      placeholder: macOS 15 / Chrome 130, Windows 11 / Firefox, etc.
